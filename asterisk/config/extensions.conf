[general]
static=yes
writeprotect=no

;==============================================================================
; Plano de discagem
;==============================================================================
; Contexto interno: permite que alice e bob liguem um para o outro (discagem
; manual) e serve de destino para o Originate disparado via AMI (a "escalada").
[internal]
; Discar diretamente os ramais (caso manual)
exten => alice,1,Dial(PJSIP/alice,30)
 same => n,Hangup()

exten => bob,1,Dial(PJSIP/bob,30)
 same => n,Hangup()
