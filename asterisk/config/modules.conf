[modules]
autoload=yes

; O chan_sip (SIP antigo, depreciado) registra o sub-protocolo WebSocket 'sip'
; ANTES do PJSIP, fazendo o res_pjsip_transport_websocket recusar carregar e
; quebrando o WebRTC. Como usamos somente PJSIP, desabilitamos o chan_sip.
noload => chan_sip.so

; Reduz ruido de modulos legados que nao usamos
noload => chan_mgcp.so
noload => chan_skinny.so
