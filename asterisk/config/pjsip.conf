;==============================================================================
; PJSIP - dois ramais WebRTC (alice e bob) para os navegadores
;==============================================================================

; --- Transporte WebSocket (usa o servidor HTTP do http.conf, porta 8088) ---
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0

;------------------------------------------------------------------------------
; ALICE
;------------------------------------------------------------------------------
[alice]
type=endpoint
transport=transport-ws
context=internal
disallow=all
allow=ulaw,alaw
webrtc=yes
dtls_auto_generate_cert=yes
auth=alice
aors=alice
callerid=Alice <alice>

[alice]
type=auth
auth_type=userpass
username=alice
password=alice123

[alice]
type=aor
max_contacts=1
remove_existing=yes

;------------------------------------------------------------------------------
; BOB
;------------------------------------------------------------------------------
[bob]
type=endpoint
transport=transport-ws
context=internal
disallow=all
allow=ulaw,alaw
webrtc=yes
dtls_auto_generate_cert=yes
auth=bob
aors=bob
callerid=Bob <bob>

[bob]
type=auth
auth_type=userpass
username=bob
password=bob123

[bob]
type=aor
max_contacts=1
remove_existing=yes
